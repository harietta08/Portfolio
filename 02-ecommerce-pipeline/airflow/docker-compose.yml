# =============================================================================
# Airflow Docker Compose — local orchestration
# CE note: Databricks CE has no scheduled Jobs. Airflow replaces that here.
#          In production, Databricks Workflows would handle scheduling.
# Usage:
#   make airflow-up    -> start all services
#   make airflow-down  -> stop all services
#   Open: http://localhost:8080 (user: airflow / pass: airflow)
# =============================================================================

version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    PYTHONPATH: /opt/airflow/project
    # GCP credentials
    GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
    GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/secrets/service_account.json
    # Databricks
    DATABRICKS_HOST: ${DATABRICKS_HOST}
    DATABRICKS_TOKEN: ${DATABRICKS_TOKEN}
    DATABRICKS_CLUSTER_ID: ${DATABRICKS_CLUSTER_ID}
    # API
    FAKESTORE_API_BASE_URL: ${FAKESTORE_API_BASE_URL:-https://fakestoreapi.com}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ..:/opt/airflow/project          # mount entire project
    - ~/.config/gcloud:/opt/airflow/secrets  # GCP credentials
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username airflow \
          --firstname Hari \
          --lastname Etta \
          --role Admin \
          --email hetta.ds@gmail.com \
          --password airflow

volumes:
  postgres_data:
