version: 1
conversations:
  - id: cpt_multiturn
    turns:
      - user: "Can I do CPT in my first semester?"
        expect:
          mode: rules
          decision: depends
          policy_id: cpt_basic
      - user: "I have completed one academic year and I have a job offer."
        expect:
          mode: rules
          decision: depends
          policy_id: cpt_basic
      - user: "Yes it's related to my major and I'm full-time."
        expect:
          mode: rules
          decision: allowed
          policy_id: cpt_basic

  - id: online_switch_after_cpt
    turns:
      - user: "Can I do CPT?"
        expect:
          mode: rules
      - user: "Can I take 2 online classes this semester?"
        expect:
          mode: rules
          policy_id: online_limit_one_course