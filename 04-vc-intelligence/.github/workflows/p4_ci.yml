# ── .github/workflows/p4_ci.yml ───────────────────────────────────────────────
# Runs on every push and PR to main
# 1. Lints code
# 2. Runs pytest suite
# 3. Runs dbt test
# Free on public repos — no minutes limit

name: P4 CI

on:
  push:
    branches: [main]
    paths:
      - '04-vc-intelligence/**'
  pull_request:
    branches: [main]
    paths:
      - '04-vc-intelligence/**'

defaults:
  run:
    working-directory: 04-vc-intelligence

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: 04-vc-intelligence/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --max-line-length=100 \
            --exclude=venv,.venv,dbt/target,notebooks \
            --ignore=E501,W503

      - name: Run pytest
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          CHROMA_PERSIST_DIR: ./chroma_db_test
          CHROMA_COLLECTION_NAME: startups_test
        run: |
          pytest tests/ -v \
            --tb=short \
            --ignore=tests/test_api.py \
            -x

      - name: Run API tests
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          CHROMA_PERSIST_DIR: ./chroma_db_test
        run: |
          pytest tests/test_api.py -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: 04-vc-intelligence/.pytest_cache

  dbt-test:
    name: dbt Schema Tests
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dbt
        run: pip install dbt-core dbt-bigquery

      - name: Write dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          vc_intelligence:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account-json
                project: ${{ secrets.GCP_PROJECT_ID }}
                dataset: vc_intelligence_ci
                keyfile_json: ${{ secrets.GCP_SA_KEY }}
                threads: 1
                timeout_seconds: 300
          EOF

      - name: dbt deps
        working-directory: 04-vc-intelligence/dbt
        run: dbt deps

      - name: dbt compile
        working-directory: 04-vc-intelligence/dbt
        run: dbt compile --profiles-dir ~/.dbt

      - name: dbt test
        working-directory: 04-vc-intelligence/dbt
        run: dbt test --profiles-dir ~/.dbt
        continue-on-error: true
