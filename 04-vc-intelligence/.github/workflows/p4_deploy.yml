# ── .github/workflows/p4_deploy.yml ───────────────────────────────────────────
# Deploys FastAPI to GCP Cloud Run on every push to main
# Only runs after CI passes — never deploys broken code
# Cloud Run: 2M requests/month free, scales to zero when idle

name: P4 Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - '04-vc-intelligence/**'
  workflow_run:
    workflows: ["P4 CI"]
    types: [completed]
    branches: [main]

defaults:
  run:
    working-directory: 04-vc-intelligence

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/vc-intelligence/api:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/vc-intelligence/api:latest \
            .

      - name: Push Docker image
        run: |
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/vc-intelligence/api:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/vc-intelligence/api:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy vc-intelligence-api \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/vc-intelligence/api:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 2Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 120 \
            --set-env-vars "HF_API_TOKEN=${{ secrets.HF_API_TOKEN }}" \
            --set-env-vars "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" \
            --set-env-vars "GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}" \
            --set-env-vars "CHROMA_PERSIST_DIR=/tmp/chroma_db" \
            --set-env-vars "CHROMA_COLLECTION_NAME=startups" \
            --set-env-vars "MLFLOW_MODEL_URI=models:/vc-sector-classifier/Production"

      - name: Get Cloud Run URL
        run: |
          URL=$(gcloud run services describe vc-intelligence-api \
            --region us-central1 \
            --format 'value(status.url)')
          echo "API live at: $URL"
          echo "CLOUD_RUN_URL=$URL" >> $GITHUB_ENV

      - name: Smoke test live endpoint
        run: |
          sleep 10
          curl -f "${{ env.CLOUD_RUN_URL }}/health" || exit 1
          echo "Health check passed"

      - name: Weekly data refresh
        if: github.event_name == 'schedule'
        run: |
          python ingestion/scraper.py
          python ingestion/validate_schema.py
          python ingestion/gcs_upload.py
          python embeddings/embed_startups.py
          python embeddings/chromadb_store.py

  schedule-refresh:
    name: Weekly Data Refresh
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: 04-vc-intelligence/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion pipeline
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa_key.json
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa_key.json
          python ingestion/scraper.py
          python ingestion/validate_schema.py
          python ingestion/gcs_upload.py
          echo "Ingestion complete"
